    items: [],
    people: ["Linda", "婚攝"],
    content: []},
  { time: "14:50", activity: { zh: "送客結束", ko: "환송 종료" },
    items: [],
    people: ["萊爾", "立萱", "Linda"],
    content: [
      { zh: "感謝朋友與主持人/小幫手", ko: "친구/사회자 감사" }
    ]},
  { time: "15:00", activity: { zh: "結帳", ko: "정산" },
    items: [],
    people: ["哥"],
    content: [{ zh: "到3樓結尾款+換回新娘證件（新娘休息室鑰匙）", ko: "3층에서 잔금 정산 + 신부 신분증 회수 (신부 대기실 열쇠 반납)" }]},
  { time: "15:10", activity: { zh: "還禮服", ko: "예복 반납" },
    items: [{ zh: "輕便衣服鞋子", ko: "편한 옷·신발" }],
    people: [], content: []}
];

// ============ 渲染邏輯 ============
const eventsContainer = document.getElementById("eventsContainer");
const koToggle = document.getElementById("koToggle");
const statsEl = document.getElementById("stats");
const backTop = document.getElementById("backTop");

const multiSelect = document.getElementById("multiSelect");
const msTrigger = document.getElementById("msTrigger");
const msDropdown = document.getElementById("msDropdown");

// 已選人員 set
const selectedPeople = new Set();

// 取得所有出現過的人員（依 PEOPLE 對照表的順序）
function getAllPeople() {
  const seen = new Set();
  EVENTS.forEach(e => e.people.forEach(p => seen.add(p)));
  return Object.keys(PEOPLE).filter(p => seen.has(p));
}

// 建立多選下拉選項
function buildDropdown() {
  const allPeople = getAllPeople();
  msDropdown.innerHTML = allPeople.map(p => {
    const ko = PEOPLE[p] || "";
    return `<label class="ms-option">
      <input type="checkbox" value="${escapeHtml(p)}">
      <span>${escapeHtml(p)}<span class="ko-tag"> ／ ${escapeHtml(ko)}</span></span>
    </label>`;
  }).join("");

  msDropdown.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.addEventListener("change", e => {
      const v = e.target.value;
      if (e.target.checked) selectedPeople.add(v);
      else selectedPeople.delete(v);
      updateTrigger();
      render();
    });
  });
}

// 更新 trigger 顯示（已選人員的 chip）
function updateTrigger() {
  if (selectedPeople.size === 0) {
    msTrigger.innerHTML = `<span class="ms-placeholder">全部顯示<span class="ko">／전체 표시</span></span>`;
    return;
  }
  const chips = Array.from(selectedPeople).map(p => {
    const ko = PEOPLE[p] || "";
    return `<span class="ms-chip" data-person="${escapeHtml(p)}">${escapeHtml(p)}<span class="ko"> ${escapeHtml(ko)}</span><span class="ms-chip-x" data-remove="${escapeHtml(p)}">×</span></span>`;
  }).join("");
  msTrigger.innerHTML = chips + `<span class="ms-clear" id="msClear">清除<span class="ko">／초기화</span></span>`;

  // chip x 按鈕
  msTrigger.querySelectorAll('.ms-chip-x').forEach(x => {
    x.addEventListener("click", e => {
      e.stopPropagation();
      const p = x.dataset.remove;
      selectedPeople.delete(p);
      // 同步 dropdown checkbox
      const cb = msDropdown.querySelector(`input[value="${CSS.escape(p)}"]`);
      if (cb) cb.checked = false;
      updateTrigger();
      render();
    });
  });
  // 清除全部
  const clearBtn = document.getElementById("msClear");
  if (clearBtn) {
    clearBtn.addEventListener("click", e => {
      e.stopPropagation();
      selectedPeople.clear();
      msDropdown.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
      updateTrigger();
      render();
    });
  }
}

// 開關下拉
msTrigger.addEventListener("click", e => {
  // 點到 chip 內部時不要觸發開合
  if (e.target.closest(".ms-chip-x") || e.target.closest(".ms-clear")) return;
  multiSelect.classList.toggle("open");
});
document.addEventListener("click", e => {
  if (!multiSelect.contains(e.target)) {
    multiSelect.classList.remove("open");
  }
});

// 渲染人員 tag
function renderPerson(p, isHighlight) {
  const ko = PEOPLE[p] || "";
  return `<span class="person-tag${isHighlight ? " highlight" : ""}">${escapeHtml(p)}<span class="ko"> ${escapeHtml(ko)}</span></span>`;
}
function renderItem(item) {
  return `<span class="item-tag">${escapeHtml(item.zh)}<span class="ko"> ／ ${escapeHtml(item.ko)}</span></span>`;
}
function renderContent(c) {
  // 直接插入 HTML，這樣才能顯示超連結標籤
  const koHtml = (c.ko != null && c.ko !== "") ? `<span class="ko-block">${c.ko}</span>` : "";
  return `<div class="content-item">${c.zh}${koHtml}</div>`;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

// 時間格式：時間範圍時拆兩行顯示
function renderTimeCell(time) {
  if (time.includes("-")) {
    const [a, b] = time.split("-");
    return `<span class="time-range">${escapeHtml(a)}<br>｜<br>${escapeHtml(b)}</span>`;
  }
  return escapeHtml(time);
}

// 渲染所有事件
function render() {
  const filtered = selectedPeople.size === 0
    ? EVENTS
    : EVENTS.filter(e => e.people.some(p => selectedPeople.has(p)));

  if (filtered.length === 0) {
    eventsContainer.innerHTML = `
      <div class="empty-state">
        <div class="icon">📭</div>
        <div>所選人員在這份流程表中沒有負責項目</div>
      </div>`;
    statsEl.textContent = "";
    return;
  }

  if (selectedPeople.size === 0) {
    statsEl.innerHTML = `共 ${filtered.length} 個流程項目<span class="ko">／총 ${filtered.length}개 항목</span>`;
  } else {
    const names = Array.from(selectedPeople).join("、");
    statsEl.innerHTML = `已選：${escapeHtml(names)}　共 ${filtered.length} 項任務<span class="ko">／총 ${filtered.length}개</span>`;
  }

  const html = filtered.map(e => {
    const isFiltering = selectedPeople.size > 0;
    const peopleHtml = e.people.length > 0
      ? `<div class="field"><span class="field-label">負責人員<span class="ko">／담당자</span></span><div class="tags">${e.people.map(p => renderPerson(p, isFiltering && selectedPeople.has(p))).join("")}</div></div>`
      : "";
    const itemsHtml = e.items.length > 0
      ? `<div class="field"><span class="field-label">需要道具<span class="ko">／필요 도구</span></span><div class="tags">${e.items.map(renderItem).join("")}</div></div>`
      : "";
    const contentHtml = e.content.length > 0
      ? `<div class="field"><span class="field-label">內容<span class="ko">／내용</span></span><div class="content-list">${e.content.map(renderContent).join("")}</div></div>`
      : "";
    return `
      <div class="event-row">
        <div class="event-time-col">${renderTimeCell(e.time)}</div>
        <div class="event-card${isFiltering ? " highlighted" : ""}">
          <div class="event-activity">${escapeHtml(e.activity.zh)}<span class="ko-block">${escapeHtml(e.activity.ko)}</span></div>
          ${peopleHtml}
          ${itemsHtml}
          ${contentHtml}
        </div>
      </div>`;
  }).join("");

  eventsContainer.innerHTML = html;
}

// 初始化
buildDropdown();
updateTrigger();
render();

// 韓文切換
koToggle.addEventListener("change", () => {
  document.body.classList.toggle("show-ko", koToggle.checked);
});

// 回頂端
window.addEventListener("scroll", () => {
  backTop.classList.toggle("visible", window.scrollY > 300);
});
backTop.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
</script>
</body>
</html>
